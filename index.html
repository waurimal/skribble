<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단어 마스터: 그림 퀴즈</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Jua', sans-serif; background-color: #f0fdf4; touch-action: manipulation; }
    canvas { touch-action: none; background-color: white; cursor: crosshair; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Custom Modal CSS */
    #custom-modal.active { display: flex; }
    
    .avatar-svg { width: 100%; height: 100%; }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col text-gray-800">

  <!-- Custom Alert Modal -->
  <div id="custom-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full text-center transform transition-all">
      <h3 id="modal-title" class="text-xl font-bold mb-4 text-green-600">알림</h3>
      <p id="modal-message" class="text-lg mb-6"></p>
      <button id="modal-btn" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl font-bold text-lg w-full transition-colors">확인</button>
    </div>
  </div>

  <!-- Screen 1: Login / Avatar Setup -->
  <div id="screen-login" class="flex-1 flex flex-col items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full flex flex-col items-center border-4 border-green-200">
      <h1 class="text-4xl text-green-500 mb-6 font-bold text-center">🎨 단어 마스터</h1>
      
      <!-- Avatar Preview -->
      <div class="w-32 h-32 mb-4 bg-gray-100 rounded-full border-4 border-gray-200 overflow-hidden flex items-center justify-center" id="avatar-preview">
        <!-- SVG injected here -->
      </div>
      
      <div class="flex gap-2 mb-6 w-full justify-center">
        <button id="btn-rand-avatar" class="bg-yellow-400 hover:bg-yellow-500 text-white px-3 py-1 rounded-lg text-sm transition-colors">랜덤 캐릭터</button>
        <div class="flex items-center gap-1">
          <label class="text-sm">색상:</label>
          <input type="color" id="avatar-color" class="w-8 h-8 rounded cursor-pointer" value="#4ADE80">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 w-full mb-4">
        <input type="number" id="input-grade" placeholder="학년" class="border-2 border-gray-200 p-3 rounded-xl focus:outline-none focus:border-green-400 text-center" min="1" max="6">
        <input type="number" id="input-class" placeholder="반" class="border-2 border-gray-200 p-3 rounded-xl focus:outline-none focus:border-green-400 text-center" min="1" max="20">
      </div>
      <div class="grid grid-cols-2 gap-3 w-full mb-6">
        <input type="number" id="input-number" placeholder="번호" class="border-2 border-gray-200 p-3 rounded-xl focus:outline-none focus:border-green-400 text-center" min="1" max="50">
        <input type="text" id="input-name" placeholder="이름" class="border-2 border-gray-200 p-3 rounded-xl focus:outline-none focus:border-green-400 text-center" maxlength="10">
      </div>

      <div class="w-full flex flex-col gap-3">
        <button id="btn-create-room" class="w-full bg-green-500 hover:bg-green-600 text-white p-4 rounded-xl text-xl transition-colors shadow-md">새 방 만들기 (호스트)</button>
        <div class="relative flex items-center py-2">
          <div class="flex-grow border-t border-gray-300"></div>
          <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">또는</span>
          <div class="flex-grow border-t border-gray-300"></div>
        </div>
        <div class="flex gap-2">
          <input type="text" id="input-room-code" placeholder="입장 코드" class="flex-1 border-2 border-gray-200 p-3 rounded-xl focus:outline-none focus:border-blue-400 text-center uppercase font-sans font-bold tracking-widest">
          <button id="btn-join-room" class="bg-blue-500 hover:bg-blue-600 text-white px-6 rounded-xl text-lg transition-colors shadow-md">입장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Screen 2: Lobby -->
  <div id="screen-lobby" class="flex-1 hidden flex-col p-4 md:p-8 max-w-5xl w-full mx-auto">
    <div class="bg-white rounded-3xl shadow-xl flex flex-col h-full overflow-hidden border-4 border-green-200">
      <div class="bg-green-100 p-4 flex justify-between items-center border-b-2 border-green-200">
        <h2 class="text-2xl text-green-700">대기실</h2>
        <div class="bg-white px-4 py-2 rounded-xl shadow font-sans font-bold tracking-widest text-xl text-gray-700">
          코드: <span id="lobby-room-code" class="text-blue-600"></span>
        </div>
        <button id="btn-leave-lobby" class="bg-red-400 hover:bg-red-500 text-white px-4 py-2 rounded-lg transition-colors">나가기</button>
      </div>
      
      <div class="flex-1 flex flex-col md:flex-row p-6 gap-6 overflow-hidden">
        <!-- Player List -->
        <div class="flex-1 flex flex-col bg-gray-50 rounded-2xl p-4 border-2 border-gray-100 overflow-y-auto">
          <h3 class="text-xl mb-4 text-gray-600 border-b pb-2">참가자 목록 (<span id="player-count">0</span>명)</h3>
          <ul id="lobby-player-list" class="space-y-3">
            <!-- Players injected here -->
          </ul>
        </div>
        
        <!-- Settings (Host) -->
        <div class="w-full md:w-1/3 flex flex-col gap-4">
          <div id="host-settings" class="bg-blue-50 rounded-2xl p-4 border-2 border-blue-100 hidden flex-col gap-4">
            <h3 class="text-xl text-blue-700 border-b border-blue-200 pb-2">게임 설정 (호스트)</h3>
            
            <div class="flex flex-col gap-1">
              <label class="text-gray-600">모드</label>
              <select id="setting-mode" class="p-2 rounded-lg border focus:outline-none">
                <option value="normal">Normal (글자수 공개)</option>
                <option value="hidden">Hidden (글자수 비공개)</option>
              </select>
            </div>
            
            <div class="flex flex-col gap-1">
              <label class="text-gray-600">총 라운드 수</label>
              <input type="number" id="setting-rounds" value="3" min="1" max="10" class="p-2 rounded-lg border focus:outline-none text-center">
            </div>
          </div>
          
          <div class="mt-auto">
            <button id="btn-start-game" class="w-full bg-green-500 hover:bg-green-600 text-white p-4 rounded-xl text-2xl transition-colors shadow-lg hidden">게임 시작하기</button>
            <p id="guest-waiting-msg" class="text-center text-gray-500 text-lg py-4">호스트가 게임을 시작할 때까지 기다려주세요...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Screen 3: Game -->
  <div id="screen-game" class="flex-1 hidden flex-col p-2 md:p-4 max-w-7xl w-full mx-auto h-full">
    <!-- Top Bar Info -->
    <div class="bg-white rounded-t-2xl shadow-sm p-3 flex justify-between items-center border-b-4 border-green-200 shrink-0">
      <div class="flex gap-4 items-center">
        <span class="bg-green-100 text-green-800 px-3 py-1 rounded-lg font-bold" id="game-round-info">라운드: 1/3</span>
        <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-lg font-bold" id="game-mode-info">모드: Normal</span>
      </div>
      <div class="text-center">
        <div id="game-word-hint" class="text-3xl font-bold tracking-widest text-gray-800 bg-yellow-100 px-6 py-2 rounded-full shadow-inner inline-block">_ _ _</div>
      </div>
      <div class="flex gap-4 items-center">
        <div class="text-right">
          <div class="text-sm text-gray-500">남은 시간</div>
          <div id="game-timer" class="text-3xl font-bold text-red-500 font-sans">60</div>
        </div>
      </div>
    </div>

    <div class="flex flex-1 overflow-hidden bg-white shadow-lg rounded-b-2xl border-x-2 border-b-2 border-gray-200">
      
      <!-- Left: Player Leaderboard -->
      <div class="w-1/4 md:w-64 bg-gray-50 border-r-2 border-gray-100 flex flex-col shrink-0">
        <div class="p-3 bg-gray-100 font-bold text-gray-600 border-b text-center">순위표</div>
        <ul id="game-player-list" class="overflow-y-auto flex-1 p-2 space-y-2">
          <!-- Players injected here -->
        </ul>
      </div>

      <!-- Center: Canvas -->
      <div class="flex-1 flex flex-col items-center justify-center bg-gray-200 relative overflow-hidden" id="canvas-container">
        <!-- Overlay when not drawer -->
        <div id="canvas-overlay" class="absolute inset-0 z-10 hidden items-center justify-center bg-black bg-opacity-10 pointer-events-none">
          <div class="bg-white px-4 py-2 rounded-full shadow text-gray-700 font-bold animate-bounce mt-auto mb-10 pointer-events-auto opacity-70">
            다른 플레이어가 그리는 중...
          </div>
        </div>
        
        <canvas id="drawing-canvas" width="800" height="600" class="bg-white shadow-md max-w-full max-h-full object-contain rounded"></canvas>
        
        <!-- Drawer Tools -->
        <div id="drawer-tools" class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-white px-4 py-2 rounded-full shadow-xl flex gap-3 items-center hidden z-20 border-2 border-gray-200">
          <input type="color" id="tool-color" value="#000000" class="w-8 h-8 rounded cursor-pointer">
          <input type="range" id="tool-size" min="1" max="20" value="5" class="w-24">
          <button id="btn-clear-canvas" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600">전체 지우기</button>
        </div>
      </div>

      <!-- Right: Chat & Guess -->
      <div class="w-1/3 md:w-80 bg-gray-50 flex flex-col border-l-2 border-gray-100 shrink-0">
        <div class="p-3 bg-blue-100 font-bold text-blue-800 border-b text-center shadow-sm z-10">채팅 및 정답</div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-2 text-base">
          <!-- Chat messages injected here -->
        </div>
        <div class="p-3 bg-white border-t">
          <input type="text" id="chat-input" placeholder="정답/힌트 입력 (도배 금지)" class="w-full border-2 border-gray-300 p-3 rounded-xl focus:outline-none focus:border-blue-500 transition-colors" autocomplete="off">
        </div>
      </div>
    </div>
  </div>

  <!-- Screen 4: Game Over / Hall of Fame -->
  <div id="screen-gameover" class="flex-1 hidden flex-col items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-2xl w-full flex flex-col items-center border-4 border-yellow-300">
      <h1 class="text-5xl text-yellow-500 mb-2 font-bold text-center">🏆 게임 종료 🏆</h1>
      <p class="text-xl text-gray-600 mb-8">최종 결과 및 명예의 전당</p>
      
      <!-- Final Podium -->
      <div id="final-podium" class="w-full flex flex-col gap-3 mb-8 bg-yellow-50 p-6 rounded-2xl border-2 border-yellow-200">
        <!-- Injected podium -->
      </div>
      
      <h2 class="text-2xl text-blue-600 font-bold mb-4 w-full border-b-2 pb-2">🌟 명예의 전당 (역대 최고 기록)</h2>
      <ul id="hall-of-fame-list" class="w-full space-y-2 mb-8 max-h-48 overflow-y-auto">
        <!-- HOF injected here -->
      </ul>

      <div class="flex gap-4 w-full">
        <button id="btn-return-lobby" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white p-4 rounded-xl text-xl transition-colors shadow-md">대기실로 돌아가기</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, arrayUnion, collection, getDocs, limit, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase Initialization ---
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'catch-mind-game';
    let firebaseConfig = {};
    try {
      firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        projectId: "dummy-project",
      };
    } catch (e) {
      console.error("Firebase config parsing error", e);
    }
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Global State ---
    let currentUser = null;
    let myUid = null;
    let currentRoomCode = null;
    let isHost = false;
    let unsubscribeRoom = null;
    let roomDataCache = null;
    let chatTimestamps = [];
    let gameTimerInterval = null;
    let drawnStrokeCount = 0; // To keep track of what's already drawn

    // --- Vocabulary List ---
    const vocabularyList = [
      "민주주의", "광합성", "인공지능", "생태계", "지구온난화", "독립운동", "피타고라스", 
      "르네상스", "수소폭탄", "블랙홀", "은하수", "고조선", "훈민정음", "거북선", "수화기",
      "마이크로파", "원자력", "신대륙", "산업혁명", "자본주의", "공산주의", "백신", "항생제",
      "스마트폰", "우주선", "현미경", "망원경", "나침반", "화약", "종이", "인쇄술"
    ];

    // --- DOM Elements ---
    const els = {
      screens: {
        login: document.getElementById('screen-login'),
        lobby: document.getElementById('screen-lobby'),
        game: document.getElementById('screen-game'),
        gameover: document.getElementById('screen-gameover')
      },
      login: {
        grade: document.getElementById('input-grade'),
        class: document.getElementById('input-class'),
        number: document.getElementById('input-number'),
        name: document.getElementById('input-name'),
        avatarColor: document.getElementById('avatar-color'),
        btnRandAvatar: document.getElementById('btn-rand-avatar'),
        avatarPreview: document.getElementById('avatar-preview'),
        roomCode: document.getElementById('input-room-code'),
        btnCreate: document.getElementById('btn-create-room'),
        btnJoin: document.getElementById('btn-join-room')
      },
      lobby: {
        code: document.getElementById('lobby-room-code'),
        playerList: document.getElementById('lobby-player-list'),
        playerCount: document.getElementById('player-count'),
        btnLeave: document.getElementById('btn-leave-lobby'),
        hostSettings: document.getElementById('host-settings'),
        btnStart: document.getElementById('btn-start-game'),
        guestMsg: document.getElementById('guest-waiting-msg'),
        settingMode: document.getElementById('setting-mode'),
        settingRounds: document.getElementById('setting-rounds')
      },
      game: {
        roundInfo: document.getElementById('game-round-info'),
        modeInfo: document.getElementById('game-mode-info'),
        wordHint: document.getElementById('game-word-hint'),
        timer: document.getElementById('game-timer'),
        playerList: document.getElementById('game-player-list'),
        canvas: document.getElementById('drawing-canvas'),
        canvasOverlay: document.getElementById('canvas-overlay'),
        drawerTools: document.getElementById('drawer-tools'),
        toolColor: document.getElementById('tool-color'),
        toolSize: document.getElementById('tool-size'),
        btnClearCanvas: document.getElementById('btn-clear-canvas'),
        chatMessages: document.getElementById('chat-messages'),
        chatInput: document.getElementById('chat-input')
      },
      gameover: {
        podium: document.getElementById('final-podium'),
        hofList: document.getElementById('hall-of-fame-list'),
        btnReturn: document.getElementById('btn-return-lobby')
      },
      modal: {
        container: document.getElementById('custom-modal'),
        title: document.getElementById('modal-title'),
        msg: document.getElementById('modal-message'),
        btn: document.getElementById('modal-btn')
      }
    };

    const ctx = els.game.canvas.getContext('2d');
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // --- Avatar System (SVG) ---
    let myAvatarState = { color: '#4ADE80', eyeType: 1, mouthType: 1 };
    
    function generateAvatarSVG(config) {
      const { color, eyeType, mouthType } = config;
      
      const eyes = {
        1: `<circle cx="35" cy="45" r="5" fill="#333"/><circle cx="65" cy="45" r="5" fill="#333"/>`, // Normal
        2: `<path d="M 30 45 Q 35 40 40 45" stroke="#333" stroke-width="3" fill="transparent"/><path d="M 60 45 Q 65 40 70 45" stroke="#333" stroke-width="3" fill="transparent"/>`, // Happy
        3: `<path d="M 30 40 L 40 45" stroke="#333" stroke-width="3"/><path d="M 70 40 L 60 45" stroke="#333" stroke-width="3"/><circle cx="35" cy="47" r="3" fill="#333"/><circle cx="65" cy="47" r="3" fill="#333"/>` // Angry
      };
      
      const mouths = {
        1: `<path d="M 40 65 Q 50 75 60 65" stroke="#333" stroke-width="3" fill="transparent"/>`, // Smile
        2: `<path d="M 40 70 Q 50 60 60 70" stroke="#333" stroke-width="3" fill="transparent"/>`, // Sad
        3: `<circle cx="50" cy="70" r="6" fill="#333"/>` // Open
      };

      return `<svg viewBox="0 0 100 100" class="avatar-svg">
        <circle cx="50" cy="50" r="45" fill="${color}" stroke="#e5e7eb" stroke-width="4"/>
        ${eyes[eyeType]}
        ${mouths[mouthType]}
      </svg>`;
    }

    function updateAvatarPreview() {
      els.login.avatarPreview.innerHTML = generateAvatarSVG(myAvatarState);
    }

    function randomizeAvatar() {
      const colors = ['#F87171', '#FBBF24', '#34D399', '#60A5FA', '#A78BFA', '#F472B6', '#4ADE80'];
      myAvatarState.color = colors[Math.floor(Math.random() * colors.length)];
      myAvatarState.eyeType = Math.floor(Math.random() * 3) + 1;
      myAvatarState.mouthType = Math.floor(Math.random() * 3) + 1;
      els.login.avatarColor.value = myAvatarState.color;
      updateAvatarPreview();
    }

    els.login.btnRandAvatar.addEventListener('click', randomizeAvatar);
    els.login.avatarColor.addEventListener('input', (e) => {
      myAvatarState.color = e.target.value;
      updateAvatarPreview();
    });

    randomizeAvatar(); // Init random

    // --- Utility Functions ---
    function showModal(msg, title = "알림", callback = null) {
      els.modal.title.innerText = title;
      els.modal.msg.innerText = msg;
      els.modal.container.classList.add('active');
      els.modal.btn.onclick = () => {
        els.modal.container.classList.remove('active');
        if (callback) callback();
      };
    }

    function switchScreen(screenName) {
      Object.values(els.screens).forEach(el => el.classList.add('hidden'));
      els.screens[screenName].classList.remove('hidden');
      els.screens[screenName].classList.add('flex');
    }

    function generateRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // removed ambiguous chars
      let code = '';
      for(let i=0; i<5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    function getMaskedName(name) {
      if (name.length <= 1) return name;
      if (name.length === 2) return name[0] + '*';
      return name[0] + '*'.repeat(name.length - 2) + name[name.length - 1];
    }

    function formatSchoolInfo() {
      const g = els.login.grade.value;
      const c = els.login.class.value;
      const n = els.login.number.value;
      if (!g || !c || !n) return "손님";
      return `${g}학년 ${c}반 ${n}번`;
    }

    function getPlayerName() {
      return els.login.name.value.trim() || "무명";
    }

    function validateLogin() {
      if (!els.login.name.value.trim()) {
        showModal("이름을 입력해주세요.");
        return false;
      }
      return true;
    }

    // --- Firebase Auth Setup ---
    const initAuth = async () => {
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
        await signInWithCustomToken(auth, __initial_auth_token);
      } else {
        await signInAnonymously(auth);
      }
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        myUid = user.uid;
      }
    });

    initAuth();

    // --- Room Logic ---
    els.login.btnCreate.addEventListener('click', async () => {
      if (!currentUser) return showModal("인증 중입니다. 잠시 후 다시 시도해주세요.");
      if (!validateLogin()) return;

      const code = generateRoomCode();
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
      
      const initialPlayer = {
        uid: myUid,
        name: getPlayerName(),
        schoolInfo: formatSchoolInfo(),
        avatar: myAvatarState,
        score: 0,
        hasGuessed: false,
        joinedAt: Date.now()
      };

      const initialRoom = {
        host: myUid,
        status: 'lobby', // lobby, playing, finished
        mode: 'normal',
        maxRounds: 3,
        currentRound: 1,
        turnIndex: 0,
        currentDrawer: null,
        currentWord: '',
        wordLength: 0,
        roundEndTime: 0,
        turnQueue: [],
        players: { [myUid]: initialPlayer },
        messages: [],
        strokes: [],
        createdAt: Date.now()
      };

      try {
        await setDoc(roomRef, initialRoom);
        isHost = true;
        currentRoomCode = code;
        joinGameFlow();
      } catch (e) {
        console.error(e);
        showModal("방 생성에 실패했습니다.");
      }
    });

    els.login.btnJoin.addEventListener('click', async () => {
      if (!currentUser) return showModal("인증 중입니다. 잠시 후 다시 시도해주세요.");
      if (!validateLogin()) return;
      
      const code = els.login.roomCode.value.trim().toUpperCase();
      if (!code) return showModal("입장 코드를 입력해주세요.");

      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
      try {
        const docSnap = await getDoc(roomRef);
        if (!docSnap.exists()) {
          return showModal("존재하지 않는 방입니다.");
        }
        
        const roomData = docSnap.data();
        if (roomData.status !== 'lobby') {
           return showModal("이미 게임이 진행 중이거나 종료된 방입니다.");
        }

        const newPlayer = {
          uid: myUid,
          name: getPlayerName(),
          schoolInfo: formatSchoolInfo(),
          avatar: myAvatarState,
          score: 0,
          hasGuessed: false,
          joinedAt: Date.now()
        };

        const currentPlayers = roomData.players || {};
        currentPlayers[myUid] = newPlayer;

        await updateDoc(roomRef, { players: currentPlayers });
        isHost = false;
        currentRoomCode = code;
        joinGameFlow();

      } catch (e) {
        console.error(e);
        showModal("방 입장 중 오류가 발생했습니다.");
      }
    });

    function joinGameFlow() {
      els.lobby.code.innerText = currentRoomCode;
      
      if (isHost) {
        els.lobby.hostSettings.classList.remove('hidden');
        els.lobby.hostSettings.classList.add('flex');
        els.lobby.btnStart.classList.remove('hidden');
        els.lobby.guestMsg.classList.add('hidden');
      } else {
        els.lobby.hostSettings.classList.add('hidden');
        els.lobby.hostSettings.classList.remove('flex');
        els.lobby.btnStart.classList.add('hidden');
        els.lobby.guestMsg.classList.remove('hidden');
      }

      switchScreen('lobby');
      listenToRoom();
    }

    function listenToRoom() {
      if (unsubscribeRoom) unsubscribeRoom();
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
      
      unsubscribeRoom = onSnapshot(roomRef, (docSnap) => {
        if (!docSnap.exists()) {
          showModal("방이 삭제되었습니다.");
          leaveGame();
          return;
        }

        const room = docSnap.data();
        roomDataCache = room;

        // Verify I am still in the room (Kicked check)
        if (!room.players || !room.players[myUid]) {
          showModal("방에서 퇴장되었습니다.");
          leaveGame();
          return;
        }

        // --- Screen Routing ---
        if (room.status === 'lobby') {
          if(!els.screens.lobby.classList.contains('flex')) switchScreen('lobby');
          updateLobbyUI(room);
        } else if (room.status === 'playing') {
          if(!els.screens.game.classList.contains('flex')) {
            switchScreen('game');
            drawnStrokeCount = 0; // Reset canvas stroke tracker on mode switch
            ctx.clearRect(0, 0, els.game.canvas.width, els.game.canvas.height);
          }
          updateGameUI(room);
        } else if (room.status === 'finished') {
          if(!els.screens.gameover.classList.contains('flex')) {
            switchScreen('gameover');
            updateGameOverUI(room);
          }
        }
      }, (error) => {
        console.error("Room sync error:", error);
      });
    }

    // --- UI Updaters ---
    function updateLobbyUI(room) {
      const players = Object.values(room.players || {}).sort((a,b) => a.joinedAt - b.joinedAt);
      els.lobby.playerCount.innerText = players.length;
      
      els.lobby.playerList.innerHTML = '';
      players.forEach(p => {
        const li = document.createElement('li');
        li.className = "flex items-center gap-3 bg-white p-3 rounded-xl shadow-sm border border-gray-100";
        li.innerHTML = `
          <div class="w-12 h-12 bg-gray-50 rounded-full border border-gray-200 p-1 flex-shrink-0">
            ${generateAvatarSVG(p.avatar)}
          </div>
          <div class="flex flex-col">
            <span class="font-bold text-gray-800 text-lg">${p.name} ${p.uid === room.host ? '<span class="text-yellow-500 text-sm">👑 호스트</span>' : ''}</span>
            <span class="text-xs text-gray-500">${p.schoolInfo}</span>
          </div>
        `;
        els.lobby.playerList.appendChild(li);
      });
    }

    function updateGameUI(room) {
      // 1. Top Info
      els.game.roundInfo.innerText = `라운드: ${room.currentRound}/${room.maxRounds}`;
      els.game.modeInfo.innerText = `모드: ${room.mode === 'hidden' ? 'Hidden' : 'Normal'}`;
      
      const isDrawer = room.currentDrawer === myUid;
      
      if (isDrawer) {
        els.game.wordHint.innerText = `[출제] ${room.currentWord}`;
        els.game.wordHint.className = "text-2xl font-bold text-red-600 bg-red-100 px-6 py-2 rounded-full shadow-inner inline-block";
        els.game.canvasOverlay.classList.add('hidden');
        els.game.drawerTools.classList.remove('hidden');
      } else {
        els.game.drawerTools.classList.add('hidden');
        els.game.canvasOverlay.classList.remove('hidden');
        
        if (room.mode === 'hidden') {
          els.game.wordHint.innerText = `? ? ? (글자수 비밀)`;
          els.game.wordHint.className = "text-2xl font-bold tracking-widest text-purple-600 bg-purple-100 px-6 py-2 rounded-full shadow-inner inline-block";
        } else {
          els.game.wordHint.innerText = Array(room.wordLength).fill('_').join(' ');
          els.game.wordHint.className = "text-3xl font-bold tracking-widest text-gray-800 bg-yellow-100 px-6 py-2 rounded-full shadow-inner inline-block";
        }
      }

      // 2. Player List (Ranked)
      const sortedPlayers = Object.values(room.players).sort((a,b) => b.score - a.score);
      els.game.playerList.innerHTML = '';
      sortedPlayers.forEach((p, idx) => {
        const isMe = p.uid === myUid;
        const isDrawingNow = p.uid === room.currentDrawer;
        
        const li = document.createElement('li');
        li.className = `flex items-center gap-2 p-2 rounded-xl border ${isMe ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-100'} ${isDrawingNow ? 'ring-2 ring-red-400' : ''}`;
        
        let rankMedal = `${idx+1}위`;
        if(idx === 0) rankMedal = '🥇 1위';
        if(idx === 1) rankMedal = '🥈 2위';
        if(idx === 2) rankMedal = '🥉 3위';

        li.innerHTML = `
          <div class="text-sm font-bold w-12 text-center text-gray-600">${rankMedal}</div>
          <div class="w-10 h-10 bg-gray-50 rounded-full border border-gray-200 p-0.5 flex-shrink-0 relative">
            ${generateAvatarSVG(p.avatar)}
            ${isDrawingNow ? '<div class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1 rounded shadow animate-pulse">🖌️</div>' : ''}
            ${p.hasGuessed ? '<div class="absolute -top-2 -right-2 bg-green-500 text-white text-xs px-1 rounded shadow">⭕</div>' : ''}
          </div>
          <div class="flex flex-col flex-1 overflow-hidden">
            <span class="font-bold text-gray-800 truncate leading-tight">${p.name}</span>
            <span class="text-xs text-blue-600 font-bold">${p.score}점</span>
          </div>
        `;
        els.game.playerList.appendChild(li);
      });

      // 3. Chat Messages
      renderChat(room.messages || []);

      // 4. Canvas Strokes sync
      syncCanvas(room.strokes || []);
      
      // 5. Host Timer check (Host controls the flow)
      if (isHost) hostCheckTurnEnd(room);
    }

    function renderChat(messages) {
      els.game.chatMessages.innerHTML = '';
      messages.forEach(m => {
        const div = document.createElement('div');
        if (m.type === 'system') {
          div.className = "bg-green-100 text-green-800 px-3 py-2 rounded-lg font-bold text-center text-sm my-1";
          div.innerText = m.text;
        } else {
          div.className = `mb-1 p-2 rounded-lg ${m.senderUid === myUid ? 'bg-blue-100 ml-auto max-w-[85%]' : 'bg-white max-w-[85%] border shadow-sm'}`;
          div.innerHTML = `
            <div class="text-xs text-gray-500 mb-0.5 font-bold">${m.senderName}</div>
            <div class="break-words text-gray-800">${m.text}</div>
          `;
        }
        els.game.chatMessages.appendChild(div);
      });
      // Scroll to bottom
      els.game.chatMessages.scrollTop = els.game.chatMessages.scrollHeight;
    }

    // --- Timer Management (Client visually updates) ---
    setInterval(() => {
      if (!roomDataCache || roomDataCache.status !== 'playing') return;
      const timeLeft = Math.max(0, Math.floor((roomDataCache.roundEndTime - Date.now()) / 1000));
      els.game.timer.innerText = timeLeft;
    }, 1000);

    // --- Host Logic: Turn Management ---
    els.lobby.btnStart.addEventListener('click', async () => {
      if (!isHost) return;
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
      
      const mode = els.lobby.settingMode.value;
      const maxRounds = parseInt(els.lobby.settingRounds.value) || 3;
      
      // Sort players reverse by join time (newest draws first)
      const players = roomDataCache.players;
      const turnQueue = Object.values(players)
        .sort((a,b) => b.joinedAt - a.joinedAt)
        .map(p => p.uid);

      const firstDrawer = turnQueue[0];
      const selectedWord = vocabularyList[Math.floor(Math.random() * vocabularyList.length)];

      await updateDoc(roomRef, {
        status: 'playing',
        mode: mode,
        maxRounds: maxRounds,
        currentRound: 1,
        turnQueue: turnQueue,
        turnIndex: 0,
        currentDrawer: firstDrawer,
        currentWord: selectedWord,
        wordLength: selectedWord.length,
        roundEndTime: Date.now() + 60000,
        strokes: [],
        messages: [{ type: 'system', text: `게임이 시작되었습니다! 첫 번째 출제자는 ${players[firstDrawer].name}님입니다.` }]
      });
    });

    async function hostCheckTurnEnd(room) {
      if (!isHost || room.status !== 'playing') return;
      
      const now = Date.now();
      const isTimeUp = now >= room.roundEndTime;
      
      // Check if everyone (except drawer) has guessed
      const guesserUids = Object.keys(room.players).filter(uid => uid !== room.currentDrawer);
      const allGuessed = guesserUids.length > 0 && guesserUids.every(uid => room.players[uid].hasGuessed);

      if (isTimeUp || allGuessed) {
        // Prevent multiple calls by setting status briefly or padding end time
        // Actually simplest is just wait for next update, but to be safe:
        if (room.changingTurn) return; 
        
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
        await updateDoc(roomRef, { changingTurn: true });

        // Wait a tiny bit so clients see last result
        setTimeout(() => advanceTurn(room), 2000);
      }
    }

    async function advanceTurn(room) {
      let nextTurnIndex = room.turnIndex + 1;
      let nextRound = room.currentRound;
      
      if (nextTurnIndex >= room.turnQueue.length) {
        nextTurnIndex = 0;
        nextRound++;
      }

      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);

      if (nextRound > room.maxRounds) {
        // GAME OVER
        await updateDoc(roomRef, { status: 'finished', changingTurn: false });
        // Host writes to Hall of Fame
        saveToHallOfFame(room);
        return;
      }

      // Reset 'hasGuessed' for all
      const updatedPlayers = { ...room.players };
      Object.keys(updatedPlayers).forEach(uid => updatedPlayers[uid].hasGuessed = false);

      const nextDrawer = room.turnQueue[nextTurnIndex];
      const activeList = getActiveVocabList();
      const nextWord = activeList[Math.floor(Math.random() * activeList.length)];
      
      const turnMsg = { type: 'system', text: `라운드 ${nextRound}, 새로운 출제자는 ${updatedPlayers[nextDrawer].name}님입니다.` };
      
      // Keep only last 40 messages to prevent doc bloat
      let newMessages = room.messages.slice(-40);
      newMessages.push(turnMsg);

      await updateDoc(roomRef, {
        currentRound: nextRound,
        turnIndex: nextTurnIndex,
        currentDrawer: nextDrawer,
        currentWord: nextWord,
        wordLength: nextWord.length,
        roundEndTime: Date.now() + 60000,
        players: updatedPlayers,
        strokes: [], // clear canvas
        messages: newMessages,
        changingTurn: false
      });
    }

    // --- Chat and Guessing Logic ---
    function checkSpam() {
      const now = Date.now();
      chatTimestamps.push(now);
      chatTimestamps = chatTimestamps.filter(time => now - time <= 3000);
      if (chatTimestamps.length >= 5) {
        return true;
      }
      return false;
    }

    els.game.chatInput.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const text = els.game.chatInput.value.trim();
        if (!text) return;
        els.game.chatInput.value = '';

        if (checkSpam()) {
          showModal("경고: 도배 행위로 인해 게임에서 퇴장됩니다.", "퇴장 안내", () => {
             kickMyself();
          });
          return;
        }

        const room = roomDataCache;
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
        const myPlayerObj = room.players[myUid];

        if (room.currentDrawer === myUid) {
          // Drawer gives a hint
          const msg = { type: 'chat', senderUid: myUid, senderName: myPlayerObj.name + " (출제자)", text: `[힌트] ${text}`, timestamp: Date.now() };
          await updateDoc(roomRef, { messages: arrayUnion(msg) });
          return;
        }

        if (text === room.currentWord && !myPlayerObj.hasGuessed) {
          // CORRECT GUESS
          const timeLeft = Math.max(0, room.roundEndTime - Date.now());
          const maxTime = 60000;
          
          // Guesser Score: max 100 points based on time
          const guesserScore = Math.floor((timeLeft / maxTime) * 100) + 10;
          
          // Drawer Score: fixed 20 + time bonus 
          const drawerScore = 20 + Math.floor((timeLeft / maxTime) * 20);

          const playersUpdate = { ...room.players };
          playersUpdate[myUid].score += guesserScore;
          playersUpdate[myUid].hasGuessed = true;
          
          if(playersUpdate[room.currentDrawer]) {
             playersUpdate[room.currentDrawer].score += drawerScore;
          }

          const sysMsg = { type: 'system', text: `🎉 ${myPlayerObj.name}님이 정답을 맞혔습니다! (+${guesserScore}점)` };

          await updateDoc(roomRef, {
            players: playersUpdate,
            messages: arrayUnion(sysMsg)
          });
        } else {
          // Normal chat
          const msg = { type: 'chat', senderUid: myUid, senderName: myPlayerObj.name, text: text, timestamp: Date.now() };
          await updateDoc(roomRef, { messages: arrayUnion(msg) });
        }
      }
    });

    async function kickMyself() {
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
      if (roomDataCache && roomDataCache.players) {
        const players = { ...roomDataCache.players };
        delete players[myUid];
        try {
          await updateDoc(roomRef, { players });
        } catch(e){}
      }
      leaveGame();
    }

    // --- Canvas Drawing Logic ---
    let isDrawing = false;
    let currentStroke = null;

    // Responsive Canvas
    function resizeCanvas() {
        const container = document.getElementById('canvas-container');
        const canvas = els.game.canvas;
        // Keep internal resolution fixed (800x600) but scale CSS display
        const ratio = Math.min(container.clientWidth / 800, container.clientHeight / 600) * 0.95;
        canvas.style.transform = `scale(${ratio})`;
        canvas.style.transformOrigin = 'center center';
    }
    window.addEventListener('resize', resizeCanvas);
    // Call once when switching to game screen
    const observer = new MutationObserver((mutations) => {
        if(!els.screens.game.classList.contains('hidden')) resizeCanvas();
    });
    observer.observe(els.screens.game, { attributes: true });

    function getMousePos(evt) {
        const rect = els.game.canvas.getBoundingClientRect();
        // Calculate scale factor since CSS transforms visual size
        const scaleX = els.game.canvas.width / rect.width;
        const scaleY = els.game.canvas.height / rect.height;

        let clientX = evt.clientX;
        let clientY = evt.clientY;
        
        if(evt.touches && evt.touches.length > 0) {
            clientX = evt.touches[0].clientX;
            clientY = evt.touches[0].clientY;
        }

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    const startDraw = (e) => {
      if (!roomDataCache || roomDataCache.currentDrawer !== myUid) return;
      isDrawing = true;
      const pos = getMousePos(e);
      
      currentStroke = {
        c: els.game.toolColor.value,
        w: els.game.toolSize.value,
        p: [{x: Math.round(pos.x), y: Math.round(pos.y)}]
      };
      
      ctx.strokeStyle = currentStroke.c;
      ctx.lineWidth = currentStroke.w;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      if(e.type==='touchstart') e.preventDefault();
    };

    const draw = (e) => {
      if (!isDrawing || !roomDataCache || roomDataCache.currentDrawer !== myUid) return;
      const pos = getMousePos(e);
      
      // Local draw
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      
      // Save point
      currentStroke.p.push({x: Math.round(pos.x), y: Math.round(pos.y)});
      if(e.type==='touchmove') e.preventDefault();
    };

    const endDraw = async (e) => {
      if (!isDrawing) return;
      isDrawing = false;
      if (!roomDataCache || roomDataCache.currentDrawer !== myUid) return;
      
      if (currentStroke.p.length > 0) {
        // Simplify stroke to save DB space if it's very long
        if(currentStroke.p.length > 100) {
           currentStroke.p = currentStroke.p.filter((_, i) => i % 2 === 0 || i === currentStroke.p.length - 1);
        }
        
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
        try {
          await updateDoc(roomRef, { strokes: arrayUnion(currentStroke) });
        } catch(err) {
          console.error("Stroke update failed (possibly too large)", err);
        }
      }
      currentStroke = null;
    };

    els.game.canvas.addEventListener('mousedown', startDraw);
    els.game.canvas.addEventListener('mousemove', draw);
    els.game.canvas.addEventListener('mouseup', endDraw);
    els.game.canvas.addEventListener('mouseleave', endDraw);

    els.game.canvas.addEventListener('touchstart', startDraw, {passive: false});
    els.game.canvas.addEventListener('touchmove', draw, {passive: false});
    els.game.canvas.addEventListener('touchend', endDraw);

    els.game.btnClearCanvas.addEventListener('click', async () => {
      if (!roomDataCache || roomDataCache.currentDrawer !== myUid) return;
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
      await updateDoc(roomRef, { strokes: [] });
    });

    // Draw strokes from Firebase
    function syncCanvas(strokes) {
      if (strokes.length === 0) {
        ctx.clearRect(0, 0, els.game.canvas.width, els.game.canvas.height);
        drawnStrokeCount = 0;
        return;
      }
      
      // Only draw new strokes to prevent flicker
      if (strokes.length > drawnStrokeCount) {
        for (let i = drawnStrokeCount; i < strokes.length; i++) {
          const s = strokes[i];
          if (!s.p || s.p.length === 0) continue;
          
          ctx.strokeStyle = s.c;
          ctx.lineWidth = s.w;
          ctx.beginPath();
          ctx.moveTo(s.p[0].x, s.p[0].y);
          for (let j = 1; j < s.p.length; j++) {
            ctx.lineTo(s.p[j].x, s.p[j].y);
          }
          ctx.stroke();
        }
        drawnStrokeCount = strokes.length;
      } else if (strokes.length < drawnStrokeCount) {
        // If length decreased, it means someone cleared or reset. Redraw all.
        ctx.clearRect(0, 0, els.game.canvas.width, els.game.canvas.height);
        for (let i = 0; i < strokes.length; i++) {
          const s = strokes[i];
          if (!s.p || s.p.length === 0) continue;
          ctx.strokeStyle = s.c;
          ctx.lineWidth = s.w;
          ctx.beginPath();
          ctx.moveTo(s.p[0].x, s.p[0].y);
          for (let j = 1; j < s.p.length; j++) {
            ctx.lineTo(s.p[j].x, s.p[j].y);
          }
          ctx.stroke();
        }
        drawnStrokeCount = strokes.length;
      }
    }

    // --- Game Over & Hall of Fame ---
    function updateGameOverUI(room) {
      const sortedPlayers = Object.values(room.players).sort((a,b) => b.score - a.score);
      
      els.gameover.podium.innerHTML = '';
      sortedPlayers.slice(0, 3).forEach((p, idx) => {
        let medal = ['🥇 1위 (승리!)', '🥈 2위', '🥉 3위'][idx];
        const color = ['bg-yellow-200', 'bg-gray-200', 'bg-orange-200'][idx];
        
        els.gameover.podium.innerHTML += `
          <div class="flex items-center gap-4 p-3 ${color} rounded-xl shadow-sm border border-white">
            <div class="w-16 h-16 bg-white rounded-full border-2 border-gray-300 p-1 flex-shrink-0">
               ${generateAvatarSVG(p.avatar)}
            </div>
            <div class="flex-1">
              <div class="text-xl font-bold">${medal}</div>
              <div class="text-gray-700">${p.schoolInfo} ${p.name}</div>
            </div>
            <div class="text-3xl font-bold text-blue-600">${p.score}점</div>
          </div>
        `;
      });
      
      loadHallOfFame();
    }

    async function saveToHallOfFame(room) {
      if (!isHost) return;
      const sortedPlayers = Object.values(room.players).sort((a,b) => b.score - a.score);
      const winner = sortedPlayers[0];
      if (!winner || winner.score === 0) return;

      const record = {
        maskedName: getMaskedName(winner.name),
        score: winner.score,
        date: Date.now(),
        avatar: winner.avatar
      };

      const hofRef = doc(db, 'artifacts', appId, 'public', 'data', 'hallOfFame', 'records');
      await setDoc(hofRef, { list: arrayUnion(record) }, { merge: true });
    }

    async function loadHallOfFame() {
      els.gameover.hofList.innerHTML = '<li class="text-center text-gray-500 py-4">불러오는 중...</li>';
      const hofRef = doc(db, 'artifacts', appId, 'public', 'data', 'hallOfFame', 'records');
      
      try {
        const docSnap = await getDoc(hofRef);
        els.gameover.hofList.innerHTML = '';
        if (docSnap.exists() && docSnap.data().list) {
          const list = docSnap.data().list.sort((a,b) => b.score - a.score).slice(0, 10);
          
          if(list.length === 0) els.gameover.hofList.innerHTML = '<li class="text-center text-gray-500">아직 기록이 없습니다.</li>';
          
          list.forEach((r, idx) => {
            els.gameover.hofList.innerHTML += `
              <li class="flex justify-between items-center bg-gray-50 p-2 rounded border border-gray-200">
                <div class="flex gap-2 items-center">
                  <span class="font-bold text-gray-400 w-6">${idx+1}.</span>
                  <div class="w-8 h-8 bg-white rounded-full p-0.5 border">${generateAvatarSVG(r.avatar)}</div>
                  <span class="font-bold text-gray-700">${r.maskedName}</span>
                </div>
                <div class="font-bold text-blue-500">${r.score}점</div>
              </li>
            `;
          });
        } else {
          els.gameover.hofList.innerHTML = '<li class="text-center text-gray-500">아직 기록이 없습니다.</li>';
        }
      } catch (e) {
        els.gameover.hofList.innerHTML = '<li class="text-center text-red-500">기록을 불러오지 못했습니다.</li>';
      }
    }

    // --- Leave / Cleanup ---
    els.lobby.btnLeave.addEventListener('click', leaveGame);
    els.gameover.btnReturn.addEventListener('click', () => {
      // Host resets room to lobby
      if(isHost) {
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomCode);
        const resetPlayers = {...roomDataCache.players};
        Object.keys(resetPlayers).forEach(k => resetPlayers[k].score = 0);
        updateDoc(roomRef, { status: 'lobby', players: resetPlayers });
      }
    });

    function leaveGame() {
      if (unsubscribeRoom) unsubscribeRoom();
      currentRoomCode = null;
      isHost = false;
      roomDataCache = null;
      switchScreen('login');
